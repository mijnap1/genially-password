<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Site status — we’ll be back soon</title>
  <style>
    :root {
      /* Grayscale palette */
      --bg-0: #000;     /* pure black */
      --bg-1: #0b0b0b;  /* near black */
      --bg-2: #161616;  /* charcoal */
      --text: #f3f3f3;  /* near white */
      --muted: #bdbdbd; /* mid gray */
      --border: #2a2a2a; /* outline gray */

      /* Cursor-driven positions */
      --x: 50%;
      --y: 50%;
      --ox: 50%; /* orb */
      --oy: 50%;

      /* Effect tuning */
      --glow-alpha: 0.12;   /* cursor glow strength */
      --glow-size: 900px;
      --glow-size-2: 1400px; /* parallax */
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background:
        /* cursor-following soft lights */
        radial-gradient(var(--glow-size) circle at var(--x) var(--y), rgba(255,255,255,var(--glow-alpha)), rgba(255,255,255,0) 60%),
        radial-gradient(var(--glow-size-2) circle at calc(var(--x) * 0.8) calc(var(--y) * 0.8), rgba(255,255,255,calc(var(--glow-alpha) * .6)), rgba(255,255,255,0) 70%),
        linear-gradient(135deg, var(--bg-0) 0%, var(--bg-1) 45%, var(--bg-2) 100%);
      background-attachment: fixed, fixed, fixed;
      transition: background 80ms ease-out;

      display: grid;
      place-items: center;
      line-height: 1.4;
      overflow: hidden;
    }

    /* Subtle film grain using pure CSS (no images) */
    body::before {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 2px, rgba(0,0,0,0.012) 2px 4px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.012) 0 2px, rgba(0,0,0,0.012) 2px 4px);
      mix-blend-mode: overlay;
      opacity: .25;
    }

    main {
      position: relative;
      text-align: center;
      padding: clamp(28px, 5vw, 64px);
      max-width: 78ch;
      z-index: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .6ch;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: #e6e6e6;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.02);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      user-select: none;
    }

    h1 {
      margin: 0 0 12px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.05;
      font-size: clamp(30px, 7vw, 64px);
      text-wrap: balance;
      text-shadow: 0 1px 0 rgba(255,255,255,.04);
    }

    .subtitle {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: clamp(14px, 2.6vw, 18px);
    }

    .hint {
      margin-top: 18px;
      font-size: 12px;
      color: #9a9a9a;
    }

    /* Minimal control pills */
    .pills {
      margin-top: 18px;
      display: inline-flex; gap: 10px; flex-wrap: wrap;
    }
    .pill {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: #dcdcdc;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform .15s ease, background .2s ease, border-color .2s ease;
      user-select: none;
    }
    .pill:hover { transform: translateY(-1px); }
    .pill[aria-pressed="true"] { background: rgba(255,255,255,0.06); border-color: #3a3a3a; }

    /* Follower orb */
    .orb {
      position: fixed;
      left: 0; top: 0;
      width: 36vmax; height: 36vmax;
      transform: translate(calc(var(--ox) - 50%), calc(var(--oy) - 50%));
      border-radius: 50%;
      background:
        radial-gradient(closest-side circle, rgba(255,255,255,0.06), rgba(255,255,255,0) 70%);
      filter: blur(40px);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    /* Fullscreen canvas for particles & ripples */
    canvas#fx { position: fixed; inset: 0; width: 100%; height: 100%; display: block; z-index: 0; }

    /* Help nudge bottom-right */
    .help {
      position: fixed; right: 14px; bottom: 12px; z-index: 2;
      color: #bcbcbc; font-size: 11px; letter-spacing: .05em;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 999px; padding: 8px 10px;
      -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
      user-select: none;
    }

    @media (prefers-reduced-motion: reduce) {
      body { transition: none; }
      .orb { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="fx" aria-hidden="true"></canvas>
  <div class="orb" aria-hidden="true"></div>

  <main>
    <div class="badge" aria-live="polite"><span id="status-pill">Status • Offline</span></div>
    <h1>This website is down for now</h1>
    <p class="subtitle">Ready for more updates soon.</p>
    <div class="pills" role="toolbar" aria-label="Background modes">
      <button class="pill" data-mode="1" aria-pressed="true" title="Constellation (1)">Constellation</button>
      <button class="pill" data-mode="2" aria-pressed="false" title="Ripples (2)">Ripples</button>
      <button class="pill" data-mode="3" aria-pressed="false" title="Spotlight (3)">Spotlight</button>
    </div>
    <p class="hint">Drag, click, or press <kbd>1</kbd>/<kbd>2</kbd>/<kbd>3</kbd>. Move the cursor to sculpt the light.</p>
  </main>

  <div class="help">Press 1•2•3 to switch modes</div>

  <script>
    // === Interaction & FX Engine (pure JS, no libs) ===
    (() => {
      const root = document.documentElement;
      const canvas = document.getElementById('fx');
      const ctx = canvas.getContext('2d', { alpha: true });
      const dpr = Math.min(window.devicePixelRatio || 1, 2);

      // Layout & size management
      let W = 0, H = 0; const resize = () => { W = canvas.width = Math.floor(innerWidth * dpr); H = canvas.height = Math.floor(innerHeight * dpr); ctx.setTransform(dpr,0,0,dpr,0,0); };
      addEventListener('resize', resize, { passive: true });
      resize();

      // Cursor state (percent + px)
      let targetX = 50, targetY = 50; // %
      let currX = targetX, currY = targetY;
      let px = innerWidth * .5, py = innerHeight * .5;

      const lerp = (a,b,t) => a + (b-a)*t;
      const clamp = (n, a, b) => Math.max(a, Math.min(b, n));

      function onPoint(x, y) {
        const w = innerWidth || 1, h = innerHeight || 1;
        targetX = (x / w) * 100; targetY = (y / h) * 100;
        px = x; py = y;
      }
      addEventListener('pointermove', e => onPoint(e.clientX, e.clientY), { passive: true });
      addEventListener('touchstart', e => { const t = e.touches && e.touches[0]; if (t) onPoint(t.clientX, t.clientY); }, { passive: true });
      addEventListener('pointerdown', e => clicks.push({ x: e.clientX, y: e.clientY, r: 0, a: 1 }));

      // Update CSS vars each frame
      function setVars() {
        root.style.setProperty('--x', currX + '%');
        root.style.setProperty('--y', currY + '%');
        root.style.setProperty('--ox', currX + '%');
        root.style.setProperty('--oy', currY + '%');
      }

      // ===== Particles (Constellation) =====
      const NUM = Math.min(120, Math.floor((innerWidth * innerHeight) / 9000));
      const particles = Array.from({ length: NUM }, () => ({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        vx: (Math.random() - 0.5) * 0.6,
        vy: (Math.random() - 0.5) * 0.6,
        r: Math.random() * 1.2 + 0.3,
      }));

      let mode = 1; // 1=Constellation, 2=Ripples, 3=Spotlight
      const buttons = document.querySelectorAll('.pill');
      buttons.forEach(btn => btn.addEventListener('click', () => setMode(+btn.dataset.mode)));
      addEventListener('keydown', e => {
        if (e.key === '1' || e.key === '2' || e.key === '3') setMode(+e.key);
      });
      function setMode(m) {
        mode = m;
        buttons.forEach(b => b.setAttribute('aria-pressed', String(+b.dataset.mode === m)));
        document.getElementById('status-pill').textContent = m===1? 'Status • Offline • Constellation' : m===2? 'Status • Offline • Ripples' : 'Status • Offline • Spotlight';
      }

      // Click ripples
      const clicks = [];

      // Idle sway
      let lastMove = Date.now();
      addEventListener('pointermove', () => lastMove = Date.now(), { passive: true });

      // Animation loop
      function frame() {
        currX = lerp(currX, targetX, 0.08);
        currY = lerp(currY, targetY, 0.08);
        setVars();

        // Idle light drift after 3s of inactivity
        if (Date.now() - lastMove > 3000) {
          const t = performance.now() * 0.0003;
          targetX = 50 + Math.cos(t) * 30;
          targetY = 50 + Math.sin(t*1.3) * 25;
        }

        // Clear canvas with alpha fade for trails
        ctx.clearRect(0,0,innerWidth,innerHeight);

        // Mode 1: Constellation particles
        if (mode === 1) {
          // Update & draw particles
          for (let p of particles) {
            // gentle pull toward pointer
            const dx = (px - p.x), dy = (py - p.y);
            const dist = Math.hypot(dx, dy) + 0.0001;
            const pull = clamp(80 / dist, 0, 0.9); // strong when close
            p.vx += (dx / dist) * pull * 0.02;
            p.vy += (dy / dist) * pull * 0.02;

            // integrate & damp
            p.x += p.vx; p.y += p.vy;
            p.vx *= 0.98; p.vy *= 0.98;

            // edges bounce
            if (p.x < 0 || p.x > innerWidth) { p.vx *= -1; p.x = clamp(p.x, 0, innerWidth); }
            if (p.y < 0 || p.y > innerHeight) { p.vy *= -1; p.y = clamp(p.y, 0, innerHeight); }
          }

          // draw particles
          ctx.globalAlpha = 0.9;
          ctx.fillStyle = '#f5f5f5';
          for (let p of particles) { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); }

          // connections
          ctx.lineWidth = 1;
          for (let i = 0; i < particles.length; i++) {
            for (let j = i+1; j < particles.length; j++) {
              const a = particles[i], b = particles[j];
              const dx = a.x - b.x, dy = a.y - b.y;
              const d2 = dx*dx + dy*dy;
              if (d2 < 120*120) {
                ctx.globalAlpha = 1 - (d2 / (120*120));
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
              }
            }
          }
        }

        // Mode 2: Ripples
        if (mode === 2) {
          // passive shimmer: moving rings around pointer
          const t = performance.now() * 0.001;
          for (let k = 0; k < 3; k++) {
            const R = (t*120 + k*60) % 180 + 20;
            ctx.globalAlpha = 0.08;
            ctx.lineWidth = 18 - k*4; ctx.strokeStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(px, py, R, 0, Math.PI*2); ctx.stroke();
          }
          // click-generated ripples
          for (let i = clicks.length - 1; i >= 0; i--) {
            const c = clicks[i];
            c.r += 8; c.a *= 0.97;
            ctx.globalAlpha = Math.max(0, c.a) * 0.35; ctx.lineWidth = 2; ctx.strokeStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.stroke();
            if (c.a < 0.02) clicks.splice(i, 1);
          }
        }

        // Mode 3: Spotlight — boost glow + add soft vignette
        if (mode === 3) {
          // vignette
          const grd = ctx.createRadialGradient(innerWidth/2, innerHeight/2, Math.min(innerWidth, innerHeight)*0.2, innerWidth/2, innerHeight/2, Math.max(innerWidth, innerHeight)*0.7);
          grd.addColorStop(0, 'rgba(0,0,0,0)');
          grd.addColorStop(1, 'rgba(0,0,0,0.35)');
          ctx.fillStyle = grd; ctx.fillRect(0,0,innerWidth,innerHeight);
        }

        requestAnimationFrame(frame);
      }

      // Boost the background glow a bit when in Spotlight
      const observer = new MutationObserver(() => {
        const active = mode === 3;
        root.style.setProperty('--glow-alpha', active ? '0.18' : '0.12');
        root.style.setProperty('--glow-size', active ? '1100px' : '900px');
        root.style.setProperty('--glow-size-2', active ? '1700px' : '1400px');
      });
      observer.observe(document.querySelector('.pills'), { attributes: true, subtree: true });

      setVars();
      frame();
    })();
  </script>
</body>
</html>
