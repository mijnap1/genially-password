<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>We’ll be right back — status</title>
  <meta name="description" content="A clean, calm blue‑and‑white waiting page with subtle motion and excellent performance/accessibility." />
  <style>
    :root{
      /* Palette — blue & white */
      --bg-0: #ffffff;
      --bg-1: #f7fbff; /* paper white w/ blue tint */
      --bg-2: #eef6ff; /* very light blue */
      --ink: #0b1f44;  /* deep navy for text */
      --muted: #557199; /* muted blue */
      --accent: #1e7cf2; /* primary blue */
      --line: #d8e7ff;   /* soft divider */

      /* Background blob positions (animated) */
      --b1x: 22%; --b1y: 28%;
      --b2x: 78%; --b2y: 72%;

      /* Card sizing */
      --card-pad: clamp(22px, 5vw, 42px);
      --radius: 24px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      color:var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background:
        radial-gradient(64vmax 64vmax at var(--b1x) var(--b1y), rgba(30,124,242,.10), rgba(30,124,242,0) 60%),
        radial-gradient(72vmax 72vmax at var(--b2x) var(--b2y), rgba(14,62,155,.10), rgba(14,62,155,0) 65%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      background-attachment: fixed, fixed, fixed;
      display:grid; place-items:center;
      overflow:hidden;
    }

    /* Gentle animated drift of the background blobs */
    @keyframes drift {
      0%{ --b1x:22%; --b1y:28%; --b2x:78%; --b2y:72%; }
      50%{ --b1x:30%; --b1y:24%; --b2x:70%; --b2y:76%; }
      100%{ --b1x:22%; --b1y:28%; --b2x:78%; --b2y:72%; }
    }
    body{ animation: drift 26s ease-in-out infinite; }

    /* Subtle paper grain for depth (no images) */
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none;
      background: repeating-linear-gradient(90deg, rgba(0,0,0,.015) 0 1px, rgba(255,255,255,.015) 1px 2px);
      mix-blend-mode: soft-light; opacity:.25;
    }

    /* Center card */
    .card{
      position:relative;
      width:min(720px, 92vw);
      padding:var(--card-pad);
      border-radius:var(--radius);
      background:rgba(255,255,255,.7);
      border:1px solid var(--line);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(30,60,120,.12), 0 8px 20px rgba(30,60,120,.08);
      text-align:center;
    }

    /* Halo behind the card */
    .card::before{
      content:""; position:absolute; inset:-80px; z-index:-1;
      background:
        conic-gradient(from 0deg, transparent 0 50%, rgba(30,124,242,.16) 60% 60%, transparent 70% 100%);
      filter: blur(48px);
      -webkit-mask: radial-gradient(closest-side circle, rgba(0,0,0,.9), transparent 70%);
              mask: radial-gradient(closest-side circle, rgba(0,0,0,.9), transparent 70%);
      animation: spin 30s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(1turn); } }

    .badge{
      display:inline-flex; gap:.6ch; align-items:center; user-select:none;
      padding:8px 12px; border-radius:999px;
      background: linear-gradient(180deg, #fff, #f5f9ff);
      border:1px solid var(--line);
      color:var(--muted); font-size:12px; letter-spacing:.06em; text-transform:uppercase;
      margin-bottom:14px;
    }
    .dot{ width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 0 rgba(30,124,242,.45); animation:pulse 2s ease-out infinite; }
    @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(30,124,242,.45)} 70%{box-shadow:0 0 0 10px rgba(30,124,242,0)} 100%{box-shadow:0 0 0 0 rgba(30,124,242,0)} }

    h1{ margin:0 0 10px; font-size:clamp(28px, 6.2vw, 56px); line-height:1.04; letter-spacing:-.02em; }
    .subtitle{ margin:0; color:var(--muted); font-size:clamp(14px, 2.6vw, 18px); }

    /* Progress bar */
    .progress{ position:relative; height:8px; width:min(520px, 80vw); margin:26px auto 0; border-radius:999px; background: #e9f2ff; border:1px solid var(--line); overflow:hidden; }
    .progress::before{
      content:""; position:absolute; inset:0; width:40%;
      background: linear-gradient(90deg, rgba(30,124,242,.12), rgba(30,124,242,.35), rgba(30,124,242,.12));
      border-radius:inherit; filter: saturate(120%);
      animation: load 2.4s ease-in-out infinite;
    }
    @keyframes load{ 0%{ transform:translateX(-60%)} 100%{ transform:translateX(260%)} }

    .links{ margin-top:18px; display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
    .btn{
      appearance:none; border:none; cursor:pointer; user-select:none;
      padding:10px 14px; border-radius:12px; font-size:14px; font-weight:600;
      background:#fff; color:var(--ink); border:1px solid var(--line);
      transition: transform .15s ease, box-shadow .2s ease;
    }
    .btn.primary{ background:linear-gradient(180deg, #1976f3, #1067e6); color:#fff; border-color:#1467e6; }
    .btn:hover{ transform: translateY(-1px); box-shadow:0 8px 20px rgba(30,60,120,.14) }
    .btn:active{ transform:none }

    .hint{ margin-top:14px; font-size:12px; color:#6983a7 }

    /* Footer help */
    .help{ position:fixed; right:14px; bottom:12px; font-size:11px; color:#58729b; background:#fff; border:1px solid var(--line); border-radius:999px; padding:8px 10px; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }

    @media (prefers-reduced-motion: reduce){
      body{ animation:none }
      .card::before{ animation:none }
      .progress::before{ animation:none; width:0 }
      .dot{ animation:none }
    }
  </style>
</head>
<body>
  <main class="card" role="main" aria-labelledby="title">
    <div class="badge" aria-live="polite"><span class="dot" aria-hidden="true"></span> <span id="status">Status • Temporarily offline</span></div>
    <h1 id="title">We’ll be right back</h1>
    <p class="subtitle">We’re polishing a few things behind the scenes. Thanks for your patience.</p>
    <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-label="Loading"></div>

    <div class="links" aria-label="Helpful actions">
      <button class="btn primary" id="retry">Retry now</button>
      <a class="btn" href="mailto:hello@example.com?subject=Site%20status" id="contact">Contact support</a>
    </div>

    <p class="hint" id="timestamp" aria-live="polite"></p>
  </main>

  <div class="help" aria-hidden="true">Clean blue theme · Accessible · Lightweight</div>

  <script>
    // Minimal JS: update timestamp and handle retry
    const ts = new Date();
    const fmt = new Intl.DateTimeFormat(undefined,{ dateStyle:'medium', timeStyle:'short' });
    document.getElementById('timestamp').textContent = `Last checked ${fmt.format(ts)}`;

    document.getElementById('retry').addEventListener('click', () => {
      // Small affordance before reload
      const btn = document.getElementById('retry');
      btn.disabled = true; btn.textContent = 'Checking…';
      setTimeout(() => location.reload(), 450);
    });

    // Optional: in case you want to toggle an online state dynamically later
    // Example API hook point:
    // fetch('/health').then(r => r.ok ? online() : offline()).catch(offline)
    function online(){ document.getElementById('status').textContent = 'Status • Online'; }
    function offline(){ document.getElementById('status').textContent = 'Status • Temporarily offline'; }
  </script>
</body>
</html>
